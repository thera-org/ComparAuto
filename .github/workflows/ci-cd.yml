name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Cancelar execuções anteriores para economizar recursos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Definir permissões mínimas necessárias (princípio do menor privilégio)
permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Prevenir jobs travados
    
    strategy:
      fail-fast: false  # Continuar testando outras versões se uma falhar
      matrix:
        node-version: [18, 20]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
    
    # Verificação de segurança de dependências
    - name: Security audit
      run: npm audit --audit-level=high
      continue-on-error: true  # Não bloquear o pipeline, mas reportar
      
    - name: Run type check
      run: npm run type-check
      
    - name: Run linting
      run: npm run lint
      
    - name: Run format check
      run: npm run format:check
      
    - name: Run tests
      run: npm run test:coverage
        
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      if: matrix.node-version == 20  # Enviar cobertura apenas uma vez
      with:
        files: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false  # Não falhar se o Codecov estiver indisponível
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        
  build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 15
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      env:
        NEXT_PUBLIC_SUPABASE_URL: 'https://placeholder.supabase.co'
        NEXT_PUBLIC_SUPABASE_ANON_KEY: 'placeholder-anon-key'
    
    # Verificar se o build foi bem-sucedido
    - name: Verify build output
      run: |
        if [ ! -d ".next" ]; then
          echo "Error: Build output directory not found"
          exit 1
        fi
        echo "Build completed successfully"
      
  deploy:
    runs-on: ubuntu-latest
    needs: [lint-and-test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10
    
    # Permissões específicas para deploy
    permissions:
      contents: read
      deployments: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy to Production
      run: |
        echo "Deploy skipped - configure VERCEL secrets to enable"
        # Para habilitar deploy, adicione os secrets:
        # - VERCEL_TOKEN
        # - VERCEL_ORG_ID
        # - VERCEL_PROJECT_ID
